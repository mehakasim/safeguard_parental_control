name: safeguard_parental_control
description: A parental control app for managing children's device usage

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  device_apps: ^2.2.0

  
  # UI Components
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # HTTP requests
  http: ^1.1.0
  
  # Charts for analytics
  fl_chart: ^0.63.0

  js: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Add assets here when we create them
  # assets:
  #   - images/